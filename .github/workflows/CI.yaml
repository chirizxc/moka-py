name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  cargo-fmt:
    name: "cargo fmt"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Install Rust + rustfmt"
        run: rustup toolchain install stable --component rustfmt

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: github.ref_type != 'tag'
        with:
          lookup-only: false # zizmor: ignore[cache-poisoning]

      - run: cargo fmt -- --check

  cargo-clippy:
    name: "cargo clippy"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Install Rust + clippy"
        run: rustup toolchain install stable --component clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: github.ref_type != 'tag'
        with:
          lookup-only: false # zizmor: ignore[cache-poisoning]

      - run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::style -D clippy::perf

  tests:
    uses: ./.github/workflows/tests.yaml

  linux:
    needs: [ tests, cargo-fmt, cargo-clippy ]
    uses: ./.github/workflows/linux.yaml

  musllinux:
    needs: [ tests, cargo-fmt, cargo-clippy ]
    uses: ./.github/workflows/musllinux.yaml

  windows:
    needs: [ tests, cargo-fmt, cargo-clippy ]
    uses: ./.github/workflows/windows.yaml

  macos:
    needs: [ tests, cargo-fmt, cargo-clippy ]
    uses: ./.github/workflows/macos.yaml

  wasm:
    needs: [ tests, cargo-fmt, cargo-clippy ]
    uses: ./.github/workflows/wasm.yaml

  android:
    needs: [ tests, cargo-fmt, cargo-clippy ]
    uses: ./.github/workflows/android.yaml

  build-sdist:
    name: "build sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Build sdist"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist

      - name: "Upload sdist"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    needs: [linux, musllinux, windows, macos, wasm, android, build-sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "wheels-*/*"

      - name: "Install uv"
        if: ${{ github.ref_type == 'tag' }}
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: "Publish to PyPI"
        if: ${{ github.ref_type == 'tag' }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
